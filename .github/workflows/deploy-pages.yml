name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        # pnpm 11 blocks native postinstall scripts by default in CI. Install
        # first without scripts, approve the exact dependency set, then rebuild
        # so Vite/esbuild/sharp/workerd binaries are available to the build.
        run: |
          pnpm install --frozen-lockfile --ignore-scripts
          pnpm approve-builds --all
          pnpm rebuild
      - name: Build GitHub Pages mirror
        run: pnpm run build:github-pages
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: github-pages-dist
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
