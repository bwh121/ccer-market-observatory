name: Deploy GitHub Pages (production)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        # pnpm 11 blocks native postinstall scripts by default in CI. Install
        # first without scripts, approve the exact dependency set, then rebuild
        # so Vite/esbuild/sharp/workerd binaries are available to the build.
        run: |
          pnpm install --frozen-lockfile --ignore-scripts
          pnpm approve-builds --all
          pnpm rebuild
      - name: Lint
        run: pnpm run lint
      - name: TypeScript check
        run: pnpm exec tsc --noEmit
      - name: Build production server
        run: pnpm run build
      - name: Test rendered HTML
        run: node --test tests/rendered-html.test.mjs
      - name: Build GitHub Pages mirror
        run: pnpm run build:github-pages
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: github-pages-dist
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
      - name: Create immutable production tag
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="prod-$(date -u +%Y.%m.%d)-${GITHUB_SHA:0:7}"
          git tag -a "$TAG" "$GITHUB_SHA" -m "Production deployment $TAG"
          git push origin "$TAG"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "### Production release" >> "$GITHUB_STEP_SUMMARY"
          echo "Deployed commit: `$GITHUB_SHA`" >> "$GITHUB_STEP_SUMMARY"
          echo "Release tag: `$TAG`" >> "$GITHUB_STEP_SUMMARY"
