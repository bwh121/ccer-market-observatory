name: Validate site changes

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: quality-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile --ignore-scripts
          pnpm approve-builds --all
          pnpm rebuild
      - name: Lint
        run: pnpm run lint
      - name: TypeScript check
        run: pnpm exec tsc --noEmit
      - name: Build production server
        run: pnpm run build
      - name: Test rendered HTML
        run: node --test tests/rendered-html.test.mjs
      - name: Build GitHub Pages mirror
        run: pnpm run build:github-pages
